name: deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_BACKEND_REPOSITORY: ${{ vars.ECR_BACKEND_REPOSITORY }}
  ECR_FRONTEND_REPOSITORY: ${{ vars.ECR_FRONTEND_REPOSITORY }}

jobs:
  deploy:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        shell: bash
        run: |
          set -euo pipefail

          REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_TAG="${GITHUB_SHA}"

          BACKEND_IMAGE="${REGISTRY}/${ECR_BACKEND_REPOSITORY}:${IMAGE_TAG}"
          FRONTEND_IMAGE="${REGISTRY}/${ECR_FRONTEND_REPOSITORY}:${IMAGE_TAG}"

          docker build \
            -f docker/backend.Dockerfile \
            -t "${BACKEND_IMAGE}" \
            -t "${REGISTRY}/${ECR_BACKEND_REPOSITORY}:latest" \
            .

          docker build \
            -f docker/frontend.Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=/api \
            -t "${FRONTEND_IMAGE}" \
            -t "${REGISTRY}/${ECR_FRONTEND_REPOSITORY}:latest" \
            .

          docker push "${BACKEND_IMAGE}"
          docker push "${REGISTRY}/${ECR_BACKEND_REPOSITORY}:latest"

          docker push "${FRONTEND_IMAGE}"
          docker push "${REGISTRY}/${ECR_FRONTEND_REPOSITORY}:latest"