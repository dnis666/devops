name: ci

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  NEXT_PUBLIC_API_BASE_URL: http://localhost:4000

jobs:
  validate:
    name: Validate application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build apps
        run: npm run build

      - name: Build backend Docker image
        run: docker build -f docker/backend.Dockerfile -t backend-ci:${{ github.sha }} .

      - name: Build frontend Docker image
        run: |
          docker build \
            -f docker/frontend.Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=/api \
            -t frontend-ci:${{ github.sha }} .
